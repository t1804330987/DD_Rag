server:
  port: 8080

spring:
  autoconfigure:
    exclude:
      - com.alibaba.cloud.ai.autoconfigure.dashscope.DashScopeEmbeddingAutoConfiguration
  datasource:
    url: jdbc:postgresql://localhost:5433/dd_rag
    username: root
    password: 123456
  flyway:
    enabled: true
  ai:
    model:
      chat: dashscope
      embedding: ollama
    dashscope:
      api-key: ${DASHSCOPE_API_KEY: # 填写Apikey}
      chat:
        options:
          model: glm-5
    ollama:
      base-url: http://localhost:11434
      embedding:
        options:
          model: qllama/bge-small-zh-v1.5
          # 单个输入超过模型 context length 时由 Ollama 截断，避免上传链路直接失败。
          truncate: true
    vectorstore:
      pgvector:
        # 向量索引类型
        index-type: HNSW
        # 距离度量，余弦值
        distance-type: COSINE_DISTANCE
        # 向量维度
        dimensions: 512
        # 批量处理大小
        max-document-batch-size: 9
        # 启动时是否自动创建表
        initialize-schema: true
        # 创建表名
        table-name: vector_store

storage:
  minio:
    endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
    access-key: ${MINIO_ACCESS_KEY:minioadmin}
    secret-key: ${MINIO_SECRET_KEY:minioadmin}
    bucket: ${MINIO_BUCKET:dd-rag-documents}

ingestion:
  chunking:
    target-tokens: 240
    max-tokens: 320
    overlap-tokens: 32
  vector:
    # 控制业务侧每次调用 VectorStore.add 的 chunk 数量，降低单次 Ollama embedding 请求压力。
    add-batch-size: 9

elasticsearch:
  host: localhost
  port: 9200
  scheme: http
  index-name: dd_rag_document_chunks

ddrag:
  auth:
    issuer: dd-rag
    access-token-expire-minutes: 30
    refresh-token-expire-days: 14
    # 仅开发环境兜底，生产环境仍应显式配置安全密钥。
    jwt-secret: ${DD_RAG_JWT_SECRET:dd-rag-dev-jwt-secret-2026-04-20-32bytes}
    refresh-cookie-name: DD_RAG_REFRESH_TOKEN
    refresh-cookie-secure: false
  dev-admin:
    username: ${DD_RAG_DEV_ADMIN_USERNAME:admin}
    email: ${DD_RAG_DEV_ADMIN_EMAIL:admin@local.ddrag.test}
    display-name: ${DD_RAG_DEV_ADMIN_DISPLAY_NAME:开发环境管理员}
    password: ${DD_RAG_DEV_ADMIN_PASSWORD:Admin@123456}
    user-code: ${DD_RAG_DEV_ADMIN_USER_CODE:admin}

assistant:
  session:
    summary:
      message-threshold: 20
      token-threshold: 8000
      stale-days: 7

logging:
  level:
    com.dong.ddrag.assistant.memory.AssistantShortTermMemoryHook: DEBUG
    com.dong.ddrag.assistant.agent.AssistantAgentFacade: DEBUG
